<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anny 3D - Three.js</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- TELA DE LOADING -->
    <div id="loading-screen">
        <div class="cover-container">
            <img src="assets/anny.png" alt="Anny" class="cover-image" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <div class="cover-placeholder" style="display: none;">👾</div>
        </div>
        
        <h1 class="game-title">ANNY</h1>
        <p class="game-subtitle">Aventura 3D</p>
        
        <!-- Área de loading e botão -->
        <div class="loading-content">
            <!-- Barra de progresso (visível durante carregamento) -->
            <div class="progress-container" id="progress-container">
                <div class="loading-percent" id="loading-percent">0%</div>
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            
            <!-- Status de carregamento -->
            <div class="loading-status" id="loading-status">Inicializando...</div>
            
            <!-- Botão INICIAR (aparece após carregar) -->
            <button class="start-button" id="start-button">INICIAR</button>
        </div>
        
        <!-- Dicas de controles -->
        <div class="controls-hint" id="controls-hint">
            <span id="desktop-hint">WASD para mover • Mouse para câmera</span>
            <span id="mobile-hint" style="display: none;">Joystick para mover</span>
        </div>
    </div>
    
    <!-- INTERFACE DO JOGO -->
    <div id="ui">
        <h1>🎮 Anny 3D</h1>
        <p>
            Use <span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> para mover<br>
            Mouse para rotar a câmera<br>
            Scroll para zoom
        </p>
    </div>
    
    <!-- JOYSTICK MOBILE -->
    <div id="joystick-container">
        <div class="joystick-base">
            <div class="joystick-direction"></div>
        </div>
        <div class="joystick-knob" id="joystick-knob"></div>
    </div>
    
    <div id="action-button"></div>
    
    <!-- CANVAS THREE.JS -->
    <div id="canvas-container"></div>

    <!-- IMPORT MAP -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <!-- SCRIPT PRINCIPAL -->
    <script type="module" src="main.js"></script>
</body>
</html>
